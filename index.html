<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC - Diego Espiritu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 { color: #880e4f; margin-bottom: 20px; }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #d81b60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #ad1457; }
        #resultado-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .imc-valor { font-size: 24px; display: block; margin-bottom: 5px; }
        .bajo { background-color: #ffecb3; color: #ff8f00; }
        .normal { background-color: #c8e6c9; color: #2e7d32; }
        .sobrepeso { background-color: #ffe0b2; color: #ef6c00; }
        .obesidad { background-color: #ffcdd2; color: #c62828; }
    </style>
</head>
<body>

<div class="card">
    <h2>Calculadora IMC (Mujeres)</h2>
    
    <div class="input-group">
        <label>Peso (kg):</label>
        <input type="number" id="peso" step="0.1" placeholder="Ej: 60.5">
    </div>

    <div class="input-group">
        <label>Estatura (cm):</label>
        <input type="number" id="estatura" placeholder="Ej: 165">
    </div>

    <button onclick="calcularIMC()">Calcular Índice</button>

    <div id="resultado-area">
        <span class="imc-valor" id="imc-num"></span>
        <span id="imc-rango"></span>
    </div>
</div>

<script>
    function calcularIMC() {
        const peso = parseFloat(document.getElementById('peso').value);
        let estatura = parseFloat(document.getElementById('estatura').value);
        const resArea = document.getElementById('resultado-area');
        const resNum = document.getElementById('imc-num');
        const resRango = document.getElementById('imc-rango');

        if (!peso || !estatura) {
            alert("Por favor, ingresa datos válidos.");
            return;
        }

        if (estatura > 3) {
            estatura = estatura / 100;
        }

        const imc = (peso / Math.pow(estatura, 2)).toFixed(1);
        resNum.innerText = `IMC: ${imc}`;
        resArea.style.display = "block";
        resArea.className = ""; 

        let categoria = "";
        let claseCss = "";

        if (imc < 18.5) {
            categoria = "Bajo peso";
            claseCss = "bajo";
        } else if (imc >= 18.5 && imc <= 24.9) {
            categoria = "Peso Normal";
            claseCss = "normal";
        } else if (imc >= 25 && imc <= 29.9) {
            categoria = "Sobrepeso";
            claseCss = "sobrepeso";
        } else {
            categoria = "Obesidad";
            claseCss = "obesidad";
        }

        resRango.innerText = `Estado: ${categoria}`;
        resArea.classList.add(claseCss);
        
        console.log(`Cálculo realizado para Diego Espiritu: IMC ${imc} (${categoria})`);
    }
</script>

</body>
</html>
